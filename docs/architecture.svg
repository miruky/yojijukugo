<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" role="img" aria-label="yojijukugoのアーキテクチャ図">
  <title>yojijukugoのアーキテクチャ: 収録データから3種の出題・おまかせ・採点・苦手復習までの流れ</title>
  <style>
    .cell { fill: none; stroke: #d2c8b2; stroke-width: 1; }
    .k { font-family: 'Hiragino Sans','Noto Sans JP',system-ui,sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 1.6px; fill: #5c4d97; }
    .h { font-family: 'Hiragino Mincho ProN','Yu Mincho',serif; font-size: 15px; font-weight: 600; fill: #211f1a; letter-spacing: 0.5px; }
    .s { font-family: 'Hiragino Sans','Noto Sans JP',system-ui,sans-serif; font-size: 11px; fill: #585347; }
    .cap { font-family: 'Hiragino Sans','Noto Sans JP',system-ui,sans-serif; font-size: 11px; fill: #6f6857; }
    .flow { stroke: #585347; stroke-width: 1.2; fill: none; marker-end: url(#head); }
    @media (prefers-color-scheme: dark) {
      .cell { stroke: #3b3829; }
      .k { fill: #b6a7e6; }
      .h { fill: #ece7d8; }
      .s { fill: #a8a18d; }
      .cap { fill: #8a8270; }
      .flow { stroke: #a8a18d; }
      .head path { fill: #a8a18d; }
    }
  </style>
  <defs>
    <marker id="head" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto">
      <path d="M0 0 L7 4 L0 8 Z" fill="#585347"/>
    </marker>
  </defs>

  <text class="k" x="36" y="40">DATA — src/lib/data</text>
  <rect class="cell" x="36" y="52" width="748" height="54" rx="2"/>
  <text class="h" x="54" y="78">idioms.ts</text>
  <text class="s" x="150" y="76">四字熟語110語。読み・意味・由来分類(漢籍 / 仏教 / 日本 / 漢語)・出典解説。</text>
  <text class="s" x="150" y="93">由来で出題範囲をしぼり込める。</text>

  <path class="flow" d="M410 106 V138"/>

  <text class="k" x="36" y="162">QUIZ ENGINE — src/lib/quiz.ts</text>
  <rect class="cell" x="36" y="174" width="240" height="92" rx="2"/>
  <text class="h" x="54" y="200">意味</text>
  <text class="s" x="54" y="222">意味文から四字熟語を</text>
  <text class="s" x="54" y="239">選ぶ4択。</text>
  <rect class="cell" x="290" y="174" width="240" height="92" rx="2"/>
  <text class="h" x="308" y="200">読み</text>
  <text class="s" x="308" y="222">語からただしい読みを</text>
  <text class="s" x="308" y="239">選ぶ4択。</text>
  <rect class="cell" x="544" y="174" width="240" height="92" rx="2"/>
  <text class="h" x="562" y="200">虫食い</text>
  <text class="s" x="562" y="222">1字を伏せ漢字を選ぶ。</text>
  <text class="s" x="562" y="239">別解になる字は誤答に</text>
  <text class="s" x="562" y="256">使わない。</text>
  <text class="cap" x="36" y="292">おまかせモードは上の3形式をまぜて出題。出題はシード付き乱数で再現でき、テストで4択の不変条件を検査する。</text>

  <path class="flow" d="M410 304 V336"/>

  <text class="k" x="36" y="360">SCORING &amp; REVIEW — progress.ts / main.ts</text>
  <rect class="cell" x="36" y="372" width="364" height="58" rx="2"/>
  <text class="h" x="54" y="398">成績</text>
  <text class="s" x="120" y="398">正答率・連続正解をlocalStorageへ保存</text>
  <text class="s" x="54" y="418">テーマや出題範囲もブラウザに残す</text>
  <rect class="cell" x="420" y="372" width="364" height="58" rx="2"/>
  <text class="h" x="438" y="398">苦手復習</text>
  <text class="s" x="520" y="398">誤答idから問題を再構成し再出題</text>
  <text class="s" x="438" y="418">由来別の内訳もあわせて表示する</text>
</svg>
